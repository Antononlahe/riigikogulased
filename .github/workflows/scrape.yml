name: Scheduled scrape

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = ~08:00 Tallinn, after overnight publishing
  workflow_dispatch:
    inputs:
      command:
        description: "Scraper command (daily | backfill --from YYYY-MM-DD --to YYYY-MM-DD | members)"
        type: string
        default: daily

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scraper
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # ApiClient defaults to https://api.riigikogu.ee; override only if needed.
      RIIGIKOGU_API_BASE: ${{ vars.RIIGIKOGU_API_BASE || 'https://api.riigikogu.ee' }}
      SCRAPER_USER_AGENT: ${{ vars.SCRAPER_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Run scraper
        # On a schedule there are no inputs, so `command` falls back to "daily". Pass the
        # value through an env var rather than interpolating ${{ }} straight into the shell
        # (avoids the script-injection footgun and the awkward empty-string check).
        env:
          SCRAPER_COMMAND: ${{ inputs.command || 'daily' }}
        run: uv run parteidistsipliin-scraper $SCRAPER_COMMAND
      # The `daily` command ingests only votings. Speeches/motions live in separate commands,
      # so the cron must run them too. Only on the daily path (a custom dispatch command
      # shouldn't also trigger these).
      - name: Ingest speech stats
        if: ${{ (inputs.command || 'daily') == 'daily' }}
        run: uv run parteidistsipliin-scraper speeches
      - name: Ingest stenogram speeches
        # Stenogram lemmatisation needs the heavy `nlp` extra (EstNLTK/Vabamorf); installed
        # here rather than in `uv sync` so the vote path stays light. --from yesterday picks up
        # the latest sittings; the ingest upserts, so the overlap with today is harmless.
        if: ${{ (inputs.command || 'daily') == 'daily' }}
        run: |
          uv sync --extra nlp
          uv run parteidistsipliin-scraper verbatims --from "$(date -u -d yesterday +%F)"
