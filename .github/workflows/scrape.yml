name: Scheduled scrape

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = ~08:00 Tallinn, after overnight publishing
  workflow_dispatch:
    inputs:
      command:
        description: "Scraper command (daily | backfill --from YYYY-MM-DD --to YYYY-MM-DD | members)"
        type: string
        default: daily

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scraper
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # ApiClient defaults to https://api.riigikogu.ee; override only if needed.
      RIIGIKOGU_API_BASE: ${{ vars.RIIGIKOGU_API_BASE || 'https://api.riigikogu.ee' }}
      SCRAPER_USER_AGENT: ${{ vars.SCRAPER_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Run scraper
        run: |
          if [ -n "${{ inputs.command }}" ]; then
            uv run parteidistsipliin-scraper ${{ inputs.command }}
          else
            uv run parteidistsipliin-scraper daily
          fi
